name: Test

on:
  pull_request:
    paths:
      - 'backend/app/**'
      - 'backend/tests/**'
      - 'backend/scripts/**'
      - 'backend/alembic/**'
      - 'backend/alembic.ini'
      - 'backend/pyproject.toml'
      - 'backend/uv.lock'
      - '.github/workflows/test.yml'
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  backend-pytest:
    name: Backend pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dockpulse
          POSTGRES_PASSWORD: dockpulse
          POSTGRES_DB: dockpulse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://dockpulse:dockpulse@localhost:5432/dockpulse_test
      SECRET_KEY: ci-test-secret-key-not-for-production
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --all-groups
      - name: Alembic migrations apply cleanly
        env:
          DATABASE_URL: postgresql+asyncpg://dockpulse:dockpulse@localhost:5432/dockpulse_test
        run: uv run alembic upgrade head
      - name: Run pytest
        # tee captures coverage output for MishaKav while pipefail preserves pytest's exit code
        run: |
          set -o pipefail
          uv run pytest -v --junitxml=pytest.xml | tee pytest-coverage.txt
      - name: Coverage report
        id: coverage_comment
        if: always()
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-coverage-path: backend/pytest-coverage.txt
          junitxml-path: backend/pytest.xml
          title: Backend coverage
          hide-emoji: true
      - name: Coverage step summary
        if: always() && steps.coverage_comment.outputs.summaryReport
        run: |
          echo "## Backend coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.coverage_comment.outputs.summaryReport }}" >> "$GITHUB_STEP_SUMMARY"
      - name: OpenAPI spec is in sync with FastAPI app
        run: uv run python -m scripts.dump_openapi --check
