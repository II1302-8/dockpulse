services:
  cert-tools:
    container_name: dockpulse-prod-cert-tools

  db:
    container_name: dockpulse-prod-db

  mosquitto:
    container_name: dockpulse-prod-mosquitto
    volumes: !override
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt-pki:/mosquitto/certs:ro
      - mqtt-certs:/mosquitto/certs/server:ro
      - /var/log/mosquitto:/mosquitto/log
    ports:
      - "8883:8883"
    depends_on:
      cert-tools:
        condition: service_healthy
      mqtt-cert-renew:
        condition: service_healthy

  mqtt-cert-renew:
    container_name: dockpulse-prod-mqtt-cert-renew
    image: alpine:3.20
    restart: unless-stopped
    command: ["sh", "/scripts/renew.sh"]
    environment:
      LEGO_EMAIL: ${LEGO_EMAIL}
      LEGO_DOMAIN: ${MQTT_PUBLIC_HOSTNAME:-mqtt.dockpulse.xyz}
      CLOUDFLARE_DNS_API_TOKEN: ${CLOUDFLARE_DNS_API_TOKEN}
      MOSQUITTO_CONTAINER: dockpulse-prod-mosquitto
    volumes:
      - ./tools/lego-renew.sh:/scripts/renew.sh:ro
      - mqtt-certs:/le
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "test", "-f", "/le/server.crt"]
      interval: 10s
      timeout: 3s
      retries: 60
      start_period: 5s
    networks: [internal]

  backend:
    container_name: dockpulse-prod-backend
    # In prod the broker presents an LE cert (CN=mqtt.dockpulse.xyz). Our
    # private service CA can't validate it, so the backend connects via
    # the public hostname and trusts the system CA store — same path the
    # ESP32 gateways use. The client cert (issued by service-ca) still
    # authenticates us to the broker.
    environment:
      MQTT_BROKER: ${MQTT_PUBLIC_HOSTNAME:-mqtt.dockpulse.xyz}
      MQTT_PORT: 8883
      MQTT_TLS_CA: /etc/ssl/certs/ca-certificates.crt
    networks:
      - internal
      - dockpulse
    labels:
      - traefik.enable=true
      - traefik.docker.network=dockpulse
      - traefik.http.routers.dockpulse-api.rule=Host(`dockpulse.xyz`) && PathPrefix(`/api`)
      - traefik.http.routers.dockpulse-api.priority=100
      - traefik.http.routers.dockpulse-api.entrypoints=https
      - traefik.http.routers.dockpulse-api.tls=true
      - traefik.http.routers.dockpulse-api.tls.certresolver=cloudflare
      - traefik.http.services.dockpulse-api.loadbalancer.server.port=8000

  frontend:
    container_name: dockpulse-prod-frontend
    profiles: !reset []
    networks:
      - internal
      - dockpulse
    labels:
      - traefik.enable=true
      - traefik.docker.network=dockpulse
      - traefik.http.routers.dockpulse-web.rule=Host(`dockpulse.xyz`) || Host(`www.dockpulse.xyz`)
      - traefik.http.routers.dockpulse-web.entrypoints=https
      - traefik.http.routers.dockpulse-web.tls=true
      - traefik.http.routers.dockpulse-web.tls.certresolver=cloudflare
      - traefik.http.routers.dockpulse-web.tls.domains[0].main=dockpulse.xyz
      - traefik.http.routers.dockpulse-web.tls.domains[0].sans=www.dockpulse.xyz
      - traefik.http.services.dockpulse-web.loadbalancer.server.port=5173

networks:
  dockpulse:
    external: true

volumes:
  mqtt-certs:
