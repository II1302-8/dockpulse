services:
  cert-tools:
    container_name: dockpulse-staging-cert-tools

  db:
    container_name: dockpulse-staging-db
    volumes: !reset []
    tmpfs:
      - /var/lib/postgresql/data

  mosquitto:
    container_name: dockpulse-staging-mosquitto

  backend:
    container_name: dockpulse-staging-backend

  frontend:
    container_name: dockpulse-staging-frontend
    profiles: !reset []

  cloudflared:
    container_name: dockpulse-staging-cloudflared
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    networks: [internal]

  fake-publisher:
    container_name: dockpulse-staging-fake-publisher
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    restart: unless-stopped
    command: >
      uv run /tools/fake_publisher.py
      --host mosquitto
      --port 8883
      --cafile /certs/service-ca/ca.crt
      --certfile /certs/clients/fake-publisher/fake-publisher.crt
      --keyfile /certs/clients/fake-publisher/fake-publisher.key
      --all
      --rate 10
      --flip-prob 0.15
    volumes:
      - ./tools:/tools
      - mqtt-pki:/certs:ro
    depends_on:
      mosquitto:
        condition: service_started
      cert-tools:
        condition: service_healthy
    networks: [internal]
