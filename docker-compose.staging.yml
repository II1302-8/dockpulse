x-loki-logging: &loki-logging
  driver: loki
  options:
    loki-url: "http://localhost:3100/loki/api/v1/push"
    loki-batch-size: "400"
    loki-retries: "3"
    loki-external-labels: "stack=dockpulse-staging,container={{.Name}},image={{.ImageName}}"
    keep-file: "true"
    mode: "non-blocking"
    max-buffer-size: "4m"

services:
  cert-tools:
    container_name: dockpulse-staging-cert-tools
    logging: *loki-logging

  db:
    container_name: dockpulse-staging-db
    volumes: !reset []
    tmpfs:
      - /var/lib/postgresql/data
    logging: *loki-logging

  mosquitto:
    container_name: dockpulse-staging-mosquitto
    logging: *loki-logging

  backend:
    container_name: dockpulse-staging-backend
    environment:
      LOG_FORMAT: json
    logging: *loki-logging

  frontend:
    container_name: dockpulse-staging-frontend
    profiles: !reset []
    logging: *loki-logging

  cloudflared:
    container_name: dockpulse-staging-cloudflared
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    networks: [internal]
    logging: *loki-logging

  fake-publisher:
    container_name: dockpulse-staging-fake-publisher
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    restart: unless-stopped
    command: >
      uv run /tools/fake_publisher.py
      --host mosquitto
      --port 8883
      --cafile /certs/service-ca/ca.crt
      --certfile /certs/clients/fake-publisher/fake-publisher.crt
      --keyfile /certs/clients/fake-publisher/fake-publisher.key
      --all
      --rate 10
      --flip-prob 0.15
    volumes:
      - ./tools:/tools
      - mqtt-pki:/certs:ro
    depends_on:
      mosquitto:
        condition: service_started
      cert-tools:
        condition: service_healthy
    networks: [internal]
    logging: *loki-logging
