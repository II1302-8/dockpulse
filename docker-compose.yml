x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  cert-tools:
    container_name: dockpulse-cert-tools
    image: alpine:3.20
    entrypoint: ["sh", "/scripts/entrypoint.sh"]
    command: ["bootstrap"]
    environment:
      CERT_DIR: /pki
    volumes:
      - mqtt-pki:/pki
      - ./tools/gen_certs.sh:/scripts/gen_certs.sh:ro
      - ./tools/cert-tools-entrypoint.sh:/scripts/entrypoint.sh:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "test", "-f", "/pki/ca-bundle.crt"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s
    networks: [internal]
    logging: *default-logging

  db:
    container_name: dockpulse-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: *default-logging

  mosquitto:
    container_name: dockpulse-mosquitto
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto-acl.conf:/mosquitto/config/acl.conf:ro
      - mqtt-pki:/mosquitto/certs:ro
    depends_on:
      cert-tools:
        condition: service_healthy
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "grep -q '^mosquitto$$' /proc/1/comm"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging: *default-logging

  backend:
    container_name: dockpulse-backend
    image: ghcr.io/ii1302-8/dockpulse-backend:${TAG:-staging}
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set (32+ random bytes, e.g. openssl rand -hex 32)}
      # required in staging/prod (overrides enforce). adoption verifier 400s without it
      FACTORY_PUBKEY: ${FACTORY_PUBKEY:-}
      MQTT_BROKER: mosquitto
      MQTT_PORT: ${MQTT_PORT:-8883}
      MQTT_TLS_CA: /certs/service-ca/ca.crt
      MQTT_TLS_CERT: /certs/clients/backend/backend.crt
      MQTT_TLS_KEY: /certs/clients/backend/backend.key
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-text}
      LOG_DEDUP_ENABLED: ${LOG_DEDUP_ENABLED:-true}
      LOG_DEDUP_WINDOW: ${LOG_DEDUP_WINDOW:-60}
      APP_ENV: ${APP_ENV:-dev}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-DockPulse <noreply@dockpulse.xyz>}
      CF_ACCESS_TEAM_DOMAIN: ${CF_ACCESS_TEAM_DOMAIN:-}
      CF_ACCESS_AUD: ${CF_ACCESS_AUD:-}
    volumes:
      - mqtt-pki:/certs:ro
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      cert-tools:
        condition: service_healthy
    networks: [internal]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8000/api/health',timeout=3); sys.exit(0 if r.status<500 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging: *default-logging

  frontend:
    container_name: dockpulse-frontend
    image: ghcr.io/ii1302-8/dockpulse-frontend:${TAG:-staging}
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks: [internal]
    profiles: [prod]
    logging: *default-logging

networks:
  internal:

volumes:
  pgdata:
  mqtt-pki:
