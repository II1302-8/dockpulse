services:
  cert-tools:
    container_name: dockpulse-cert-tools
    image: alpine:3.20
    entrypoint: ["sh", "/scripts/entrypoint.sh"]
    command: ["bootstrap"]
    environment:
      CERT_DIR: /pki
    volumes:
      - mqtt-pki:/pki
      - ./tools/gen_certs.sh:/scripts/gen_certs.sh:ro
      - ./tools/cert-tools-entrypoint.sh:/scripts/entrypoint.sh:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "test", "-f", "/pki/ca-bundle.crt"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s
    networks: [internal]

  db:
    container_name: dockpulse-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  mosquitto:
    container_name: dockpulse-mosquitto
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt-pki:/mosquitto/certs:ro
    depends_on:
      cert-tools:
        condition: service_healthy
    networks: [internal]

  backend:
    container_name: dockpulse-backend
    image: ghcr.io/ii1302-8/dockpulse-backend:${TAG:-staging}
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: sh -c "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      MQTT_BROKER: mosquitto
      MQTT_PORT: ${MQTT_PORT:-8883}
      MQTT_TLS_CA: /certs/service-ca/ca.crt
      MQTT_TLS_CERT: /certs/clients/backend/backend.crt
      MQTT_TLS_KEY: /certs/clients/backend/backend.key
    volumes:
      - mqtt-pki:/certs:ro
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_started
      cert-tools:
        condition: service_healthy
    networks: [internal]

  frontend:
    container_name: dockpulse-frontend
    image: ghcr.io/ii1302-8/dockpulse-frontend:${TAG:-staging}
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks: [internal]
    profiles: [prod]

networks:
  internal:

volumes:
  pgdata:
  mqtt-pki:
