services:
  db:
    container_name: dockpulse-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  mosquitto:
    container_name: dockpulse-mosquitto
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks: [internal]

  migrate:
    container_name: dockpulse-migrate
    image: ghcr.io/ii1302-8/dockpulse-backend:${TAG:-staging}
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uv run alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    networks: [internal]
    restart: "no"

  backend:
    container_name: dockpulse-backend
    image: ghcr.io/ii1302-8/dockpulse-backend:${TAG:-staging}
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      MQTT_BROKER: mosquitto
      MQTT_PORT: ${MQTT_PORT}
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    networks: [internal]

  frontend:
    container_name: dockpulse-frontend
    image: ghcr.io/ii1302-8/dockpulse-frontend:${TAG:-staging}
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks: [internal]
    profiles: [prod]

networks:
  internal:

volumes:
  pgdata:
