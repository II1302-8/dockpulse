  /api/adoptions/{request_id}/stream:
    get:
      description: Opens a long-lived `text/event-stream` for a single adoption request. The first frame
        is a snapshot of the current state. Subsequent frames are `AdoptionUpdateEvent` (DB-backed terminal/snapshot
        transitions) or `AdoptionStateEvent` (advisory phase events forwarded from the gateway). The stream
        closes once the request reaches a terminal state (`ok` or `err`).
      operationId: streamAdoption
      parameters:
      - in: path
        name: request_id
        required: true
        schema:
          title: Request Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                anyOf:
                - $ref: '#/components/schemas/AdoptionUpdateEvent'
                - $ref: '#/components/schemas/AdoptionStateEvent'
                title: Response 200 Streamadoption
          description: Each frame is a JSON-encoded AdoptionUpdateEvent or AdoptionStateEvent.
        '404':
          description: Adoption request not found
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - APIKeyCookie: []
      summary: Subscribe to adoption progress via Server-Sent Events
      tags:
      - adoptions
