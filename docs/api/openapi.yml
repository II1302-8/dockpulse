components:
  schemas:
    AdoptIn:
      properties:
        berth_id:
          title: Berth Id
          type: string
        gateway_id:
          title: Gateway Id
          type: string
        qr_payload:
          description: Base64url-encoded JSON from QR fragment (uuid, oob, sn, jwt)
          title: Qr Payload
          type: string
      required:
      - qr_payload
      - berth_id
      - gateway_id
      title: AdoptIn
      type: object
    AdoptionRequestOut:
      properties:
        berth_id:
          title: Berth Id
          type: string
        completed_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Completed At
        created_at:
          format: date-time
          title: Created At
          type: string
        error_code:
          anyOf:
          - type: string
          - type: 'null'
          title: Error Code
        error_msg:
          anyOf:
          - type: string
          - type: 'null'
          title: Error Msg
        expires_at:
          format: date-time
          title: Expires At
          type: string
        gateway_id:
          title: Gateway Id
          type: string
        mesh_unicast_addr:
          anyOf:
          - type: string
          - type: 'null'
          title: Mesh Unicast Addr
        mesh_uuid:
          title: Mesh Uuid
          type: string
        request_id:
          title: Request Id
          type: string
        serial_number:
          title: Serial Number
          type: string
        status:
          enum:
          - pending
          - ok
          - err
          title: Status
          type: string
      required:
      - request_id
      - mesh_uuid
      - serial_number
      - gateway_id
      - berth_id
      - status
      - expires_at
      - created_at
      title: AdoptionRequestOut
      type: object
    BerthOut:
      properties:
        battery_pct:
          anyOf:
          - type: integer
          - type: 'null'
          title: Battery Pct
        berth_id:
          title: Berth Id
          type: string
        depth_m:
          anyOf:
          - type: number
          - type: 'null'
          title: Depth M
        dock_id:
          title: Dock Id
          type: string
        label:
          anyOf:
          - type: string
          - type: 'null'
          title: Label
        last_updated:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Last Updated
        length_m:
          anyOf:
          - type: number
          - type: 'null'
          title: Length M
        sensor_raw:
          anyOf:
          - type: integer
          - type: 'null'
          title: Sensor Raw
        status:
          title: Status
          type: string
        width_m:
          anyOf:
          - type: number
          - type: 'null'
          title: Width M
      required:
      - berth_id
      - dock_id
      - status
      title: BerthOut
      type: object
    BerthUpdateEvent:
      properties:
        berth:
          $ref: '#/components/schemas/BerthOut'
        type:
          const: berth.update
          default: berth.update
          title: Type
          type: string
      required:
      - berth
      title: BerthUpdateEvent
      type: object
    DockOut:
      properties:
        dock_id:
          title: Dock Id
          type: string
        harbor_id:
          title: Harbor Id
          type: string
        name:
          title: Name
          type: string
      required:
      - dock_id
      - harbor_id
      - name
      title: DockOut
      type: object
    DockWithBerthsOut:
      properties:
        berths:
          default: []
          items:
            $ref: '#/components/schemas/BerthOut'
          title: Berths
          type: array
        dock_id:
          title: Dock Id
          type: string
        harbor_id:
          title: Harbor Id
          type: string
        name:
          title: Name
          type: string
      required:
      - dock_id
      - harbor_id
      - name
      title: DockWithBerthsOut
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    HealthStatus:
      properties:
        database:
          enum:
          - ok
          - error
          title: Database
          type: string
        mqtt:
          enum:
          - ok
          - error
          title: Mqtt
          type: string
        status:
          enum:
          - ok
          - degraded
          title: Status
          type: string
        uptime:
          title: Uptime
          type: number
      required:
      - status
      - uptime
      - database
      - mqtt
      title: HealthStatus
      type: object
    LoginIn:
      properties:
        email:
          format: email
          title: Email
          type: string
        password:
          title: Password
          type: string
      required:
      - email
      - password
      title: LoginIn
      type: object
    TokenOut:
      properties:
        access_token:
          title: Access Token
          type: string
        token_type:
          const: bearer
          default: bearer
          title: Token Type
          type: string
      required:
      - access_token
      title: TokenOut
      type: object
    UserCreate:
      properties:
        boat_club:
          anyOf:
          - type: string
          - type: 'null'
          title: Boat Club
        email:
          format: email
          title: Email
          type: string
        firstname:
          minLength: 1
          title: Firstname
          type: string
        lastname:
          minLength: 1
          title: Lastname
          type: string
        password:
          minLength: 8
          title: Password
          type: string
        phone:
          anyOf:
          - type: string
          - type: 'null'
          title: Phone
      required:
      - firstname
      - lastname
      - email
      - password
      title: UserCreate
      type: object
    UserOut:
      properties:
        boat_club:
          anyOf:
          - type: string
          - type: 'null'
          title: Boat Club
        email:
          title: Email
          type: string
        firstname:
          title: Firstname
          type: string
        lastname:
          title: Lastname
          type: string
        phone:
          anyOf:
          - type: string
          - type: 'null'
          title: Phone
        role:
          enum:
          - harbormaster
          - boat_owner
          title: Role
          type: string
        user_id:
          title: User Id
          type: string
      required:
      - user_id
      - firstname
      - lastname
      - email
      - role
      title: UserOut
      type: object
    UserPatch:
      properties:
        boat_club:
          anyOf:
          - type: string
          - type: 'null'
          title: Boat Club
        email:
          anyOf:
          - format: email
            type: string
          - type: 'null'
          title: Email
        firstname:
          anyOf:
          - type: string
          - type: 'null'
          title: Firstname
        lastname:
          anyOf:
          - type: string
          - type: 'null'
          title: Lastname
        password:
          anyOf:
          - type: string
          - type: 'null'
          title: Password
        phone:
          anyOf:
          - type: string
          - type: 'null'
          title: Phone
      title: UserPatch
      type: object
    ValidationError:
      properties:
        ctx:
          title: Context
          type: object
        input:
          title: Input
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
  securitySchemes:
    HTTPBearer:
      scheme: bearer
      type: http
info:
  description: 'REST API for the DockPulse harbor berth availability system.


    The OpenAPI document at `/openapi.json` (and the YAML mirror in

    `docs/api/openapi.yml`) is generated directly from these route

    definitions and Pydantic models. The committed YAML is regenerated by

    `scripts/dump_openapi.py` and CI fails on drift.

    '
  title: DockPulse API
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/adoptions/{request_id}:
    get:
      operationId: getAdoption
      parameters:
      - in: path
        name: request_id
        required: true
        schema:
          title: Request Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdoptionRequestOut'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Get Adoption
      tags:
      - adoptions
  /api/berths:
    get:
      operationId: listBerths
      parameters:
      - description: filter by dock
        in: query
        name: dock_id
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: filter by dock
          title: Dock Id
      - description: filter by status
        in: query
        name: status
        required: false
        schema:
          anyOf:
          - pattern: ^(free|occupied)$
            type: string
          - type: 'null'
          description: filter by status
          title: Status
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/BerthOut'
                title: Response Listberths
                type: array
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List all berths
      tags:
      - berths
  /api/berths/stream:
    get:
      description: Opens a long-lived `text/event-stream` connection. Each message is a JSON-encoded `BerthUpdateEvent`.
        Clients should first fetch a snapshot via `GET /api/berths` and then merge streamed updates by
        `berth_id`. Reconnects re-subscribe but do not replay missed events — re-fetch the snapshot after
        an `open` that follows a disconnection.
      operationId: streamBerths
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BerthUpdateEvent'
          description: Each frame is a JSON-encoded BerthUpdateEvent.
      summary: Subscribe to live berth updates via Server-Sent Events
      tags:
      - berths
  /api/berths/{berth_id}:
    get:
      operationId: getBerth
      parameters:
      - in: path
        name: berth_id
        required: true
        schema:
          title: Berth Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BerthOut'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get a single berth
      tags:
      - berths
  /api/docks:
    get:
      operationId: listDocks
      parameters:
      - description: Filter by harbor
        in: query
        name: harbor_id
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by harbor
          title: Harbor Id
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/DockOut'
                title: Response Listdocks
                type: array
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List all docks
      tags:
      - docks
  /api/docks/{dock_id}:
    get:
      operationId: getDock
      parameters:
      - in: path
        name: dock_id
        required: true
        schema:
          title: Dock Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DockWithBerthsOut'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get a single dock with its berths
      tags:
      - docks
  /api/health:
    get:
      operationId: getHealth
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
          description: Successful Response
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
          description: Service is degraded — at least one dependency is unreachable
      summary: Health check
      tags:
      - system
  /api/nodes/adopt:
    post:
      operationId: adoptNode
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdoptIn'
        required: true
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdoptionRequestOut'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Adopt Node
      tags:
      - nodes
  /api/users:
    post:
      operationId: registerUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserOut'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Register a new user
      tags:
      - users
  /api/users/me:
    delete:
      operationId: delete_user_api_users_me_delete
      responses:
        '204':
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: Delete User
      tags:
      - users
    get:
      operationId: getMe
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserOut'
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: Get current user profile
      tags:
      - users
    patch:
      operationId: updateMe
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPatch'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserOut'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Update current user profile
      tags:
      - users
  /api/users/token:
    post:
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginIn'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenOut'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Log in and obtain an access token
      tags:
      - users
servers:
- description: Local development
  url: http://localhost:8000
- description: Staging
  url: https://staging.example.com
tags:
- description: System health and status
  name: system
- description: Berth monitoring and live updates
  name: berths
- description: Dock listing and detail
  name: docks
- description: User registration, login, profile
  name: users
- description: Node adoption and lifecycle
  name: nodes
- description: Adoption request status
  name: adoptions
