info:
  description: 'REST API for the DockPulse harbor berth availability system.


    The OpenAPI document at `/openapi.json` (and the YAML mirror in

    `docs/api/openapi.yml`) is generated directly from these route

    definitions and Pydantic models. The committed YAML is regenerated by

    `scripts/dump_openapi.py` and CI fails on drift.

    '
  title: DockPulse API
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/adoptions:
    post:
      operationId: createAdoption
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdoptIn'
        required: true
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdoptionRequestOut'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Create an adoption request for a scanned node
      tags:
      - adoptions
  /api/adoptions/{request_id}:
    get:
      operationId: getAdoption
      parameters:
      - in: path
        name: request_id
        required: true
        schema:
          title: Request Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdoptionRequestOut'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Get an adoption request by id
      tags:
      - adoptions
  /api/adoptions/{request_id}/stream:
    get:
      description: Opens a long-lived `text/event-stream` for a single adoption request. The first frame
        is a snapshot of the current state. Subsequent frames are `AdoptionUpdateEvent`s emitted when
        the gateway reports back. The stream closes once the request reaches a terminal state (`ok` or
        `err`).
      operationId: streamAdoption
      parameters:
      - in: path
        name: request_id
        required: true
        schema:
          title: Request Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdoptionUpdateEvent'
          description: Each frame is a JSON-encoded AdoptionUpdateEvent.
        '404':
          description: Adoption request not found
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Subscribe to adoption progress via Server-Sent Events
      tags:
      - adoptions
  /api/auth/login:
    post:
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginIn'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenOut'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Log in and obtain an access token
      tags:
      - auth
  /api/auth/logout:
    post:
      operationId: logout
      responses:
        '204':
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: Invalidate all tokens for the current user
      tags:
      - auth
  /api/auth/register:
    post:
      operationId: registerUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserOut'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Register a new user
      tags:
      - auth
  /api/berths:
    get:
      operationId: listBerths
      parameters:
      - description: filter by dock
        in: query
        name: dock_id
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: filter by dock
          title: Dock Id
      - description: filter by status
        in: query
        name: status
        required: false
        schema:
          anyOf:
          - pattern: ^(free|occupied)$
            type: string
          - type: 'null'
          description: filter by status
          title: Status
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/BerthOut'
                title: Response Listberths
                type: array
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List all berths
      tags:
      - berths
  /api/berths/stream:
    get:
      description: Opens a long-lived `text/event-stream` connection. Each message is a JSON-encoded `BerthUpdateEvent`.
        Clients should first fetch a snapshot via `GET /api/berths` and then merge streamed updates by
        `berth_id`. Reconnects re-subscribe but do not replay missed events — re-fetch the snapshot after
        an `open` that follows a disconnection.
      operationId: streamBerths
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BerthUpdateEvent'
          description: Each frame is a JSON-encoded BerthUpdateEvent.
      summary: Subscribe to live berth updates via Server-Sent Events
      tags:
      - berths
  /api/berths/{berth_id}:
    get:
      operationId: getBerth
      parameters:
      - in: path
        name: berth_id
        required: true
        schema:
          title: Berth Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BerthOut'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get a single berth
      tags:
      - berths
  /api/berths/{berth_id}/assignment:
    delete:
      operationId: removeBerthAssignment
      parameters:
      - in: path
        name: berth_id
        required: true
        schema:
          title: Berth Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
