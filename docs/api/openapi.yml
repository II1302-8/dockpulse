components:
  schemas:
    AdoptIn:
      properties:
        berth_id:
          examples:
          - berth-001
          title: Berth Id
          type: string
        gateway_id:
          examples:
          - gw-dock-a
          title: Gateway Id
          type: string
        qr_payload:
          description: Base64url-encoded JSON from QR fragment (uuid, oob, sn, jwt)
          maxLength: 4096
          minLength: 1
          title: Qr Payload
          type: string
      required:
      - qr_payload
      - berth_id
      - gateway_id
      title: AdoptIn
      type: object
    AdoptionAdminOut:
      properties:
        berth_id:
          title: Berth Id
          type: string
        completed_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Completed At
        created_at:
          format: date-time
          title: Created At
          type: string
        error_code:
          anyOf:
          - type: string
          - type: 'null'
          title: Error Code
        error_msg:
          anyOf:
          - type: string
          - type: 'null'
          title: Error Msg
        expires_at:
          format: date-time
          title: Expires At
          type: string
        gateway_id:
          title: Gateway Id
          type: string
        mesh_uuid:
          title: Mesh Uuid
          type: string
        request_id:
          title: Request Id
          type: string
        serial_number:
          title: Serial Number
          type: string
        status:
          examples:
          - pending
          title: Status
          type: string
      required:
      - request_id
      - mesh_uuid
      - serial_number
      - gateway_id
      - berth_id
      - status
      - expires_at
      - created_at
      title: AdoptionAdminOut
      type: object
    AdoptionCancelOut:
      properties:
        error_code:
          anyOf:
          - type: string
          - type: 'null'
          title: Error Code
        request_id:
          title: Request Id
          type: string
        status:
          title: Status
          type: string
      required:
      - request_id
      - status
      title: AdoptionCancelOut
      type: object
    AdoptionPipelineStatus:
      properties:
        err_last_15min:
          description: Failed adoptions in the last 15 minutes
          examples:
          - 0
          title: Err Last 15Min
          type: integer
        pending:
          description: Pending adoption requests
          examples:
          - 0
          title: Pending
          type: integer
      required:
      - pending
      - err_last_15min
      title: AdoptionPipelineStatus
      type: object
    AdoptionRequestOut:
      properties:
        berth_id:
          examples:
          - berth-001
          title: Berth Id
          type: string
        completed_at:
          anyOf:
          - examples: &id001
            - '2026-05-03T14:31:00Z'
            format: date-time
            type: string
          - type: 'null'
          examples: *id001
          title: Completed At
        created_at:
          examples:
          - '2026-05-03T14:30:00Z'
          format: date-time
          title: Created At
          type: string
        error_code:
          anyOf:
          - examples: &id002
            - timeout
            type: string
          - type: 'null'
          examples: *id002
          title: Error Code
        error_msg:
          anyOf:
          - examples: &id003
            - node did not respond
            type: string
          - type: 'null'
          examples: *id003
          title: Error Msg
        expires_at:
          examples:
          - '2026-05-03T14:35:00Z'
          format: date-time
          title: Expires At
          type: string
        gateway_id:
          examples:
          - gw-dock-a
          title: Gateway Id
          type: string
        mesh_unicast_addr:
          anyOf:
          - examples: &id004
            - '0x0042'
            type: string
          - type: 'null'
          examples: *id004
          title: Mesh Unicast Addr
        mesh_uuid:
          examples:
          - a1b2c3d4-e5f6-7890-abcd-ef1234567890
          title: Mesh Uuid
          type: string
        request_id:
          examples:
          - req-0001
          title: Request Id
          type: string
        serial_number:
          examples:
          - DP-N-000123
          title: Serial Number
          type: string
        status:
          enum:
          - pending
          - ok
          - err
          title: Status
          type: string
      required:
      - request_id
      - mesh_uuid
      - serial_number
      - gateway_id
      - berth_id
      - status
      - expires_at
      - created_at
      title: AdoptionRequestOut
      type: object
    AdoptionStateEvent:
      properties:
        request_id:
          title: Request Id
          type: string
        state:
          description: Provisioning phase reported by the gateway
          examples:
