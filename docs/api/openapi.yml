info:
  description: 'REST API for the DockPulse harbor berth availability system.


    The OpenAPI document at `/openapi.json` (and the YAML mirror in

    `docs/api/openapi.yml`) is generated directly from these route

    definitions and Pydantic models. The committed YAML is regenerated by

    `scripts/dump_openapi.py` and CI fails on drift.

    '
  title: DockPulse API
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/admin/adoptions:
    delete:
      description: default 'err', pass 'pending' to cancel-and-delete, 'all' to wipe
      operationId: adminBulkDeleteAdoptions
      parameters:
      - in: query
        name: status
        required: false
        schema:
          default: err
          title: Status
          type: string
      - in: header
        name: Cf-Access-Jwt-Assertion
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cf-Access-Jwt-Assertion
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDeleteOut'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Bulk Delete Adoptions
      tags:
      - admin
    get:
      operationId: adminListAdoptions
      parameters:
      - in: query
        name: status
        required: false
        schema:
          anyOf:
          - pattern: ^(pending|err|ok)$
            type: string
          - type: 'null'
          title: Status
      - in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 500
          minimum: 1
          title: Limit
          type: integer
      - in: header
        name: Cf-Access-Jwt-Assertion
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cf-Access-Jwt-Assertion
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/AdoptionAdminOut'
                title: Response Adminlistadoptions
                type: array
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List Adoptions
      tags:
      - admin
  /api/admin/adoptions/{request_id}/cancel:
    post:
      operationId: adminCancelAdoption
      parameters:
      - in: path
        name: request_id
        required: true
        schema:
          title: Request Id
