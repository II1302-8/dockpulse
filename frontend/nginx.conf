log_format json_combined escape=json
    '{'
        '"ts":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$body_bytes_sent,'
        '"referer":"$http_referer",'
        '"user_agent":"$http_user_agent",'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"x_request_id":"$http_x_request_id"'
    '}';

server {
    listen 5173;
    root /usr/share/nginx/html;
    index index.html;
    access_log /dev/stdout json_combined;

    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    gzip_static on;
    gzip_vary on;

    location ~* /(wp-admin|wp-login|wp-includes|wordpress|xmlrpc\.php|\.env|\.git|phpmyadmin|admin\.php|administrator) {
        return 444;
    }

    # Hashed build assets — immutable, cache forever
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # HTML must always revalidate so new builds are picked up
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
