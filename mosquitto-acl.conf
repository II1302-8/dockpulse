# DockPulse MQTT ACL
# Identity = cert CN (use_identity_as_username true).
# Service CA issues: backend, fake-publisher.
# Device CA issues: per-gateway / per-sensor certs (CN = gateway_id / node_id).
#
# Known mosquitto warnings on startup:
#   "File ... has world readable permissions" / "owner is not mosquitto"
#     bind mount preserves host uid+mode; git only tracks the exec bit, so
#     a repo-side chmod doesn't stick. Deploy-side fix needed (entrypoint
#     shim that copies+chowns into a writable config path inside the
#     container). Cosmetic on mosquitto 2.x; future versions will refuse.
#   "ACL pattern 'harbor/+/+/+/{status,heartbeat}' does not contain '%c' or '%u'"
#     intentional — see comment block above the patterns.

# Backend: full access (subscribes broadly, publishes provisioning commands).
user backend
topic readwrite #

# Dev/test publisher: berth tree only.
user fake-publisher
topic write harbor/+/+/+/status
topic write harbor/+/+/+/heartbeat

# Gateways/devices: %u = cert CN.
# Adoption channel scoped to the gateway's own id.
pattern read   dockpulse/v1/gw/%u/provision/req
pattern write  dockpulse/v1/gw/%u/provision/resp
pattern read   dockpulse/v1/gw/%u/decommission/req
pattern write  dockpulse/v1/gw/%u/decommission/resp
pattern write  dockpulse/v1/gw/%u/status

# Berth telemetry: topic shape lacks a publisher id segment, so we cannot
# bind these to %u without a contract change. Any device-CA client can
# publish; backend validates node_id in the payload.
pattern write  harbor/+/+/+/status
pattern write  harbor/+/+/+/heartbeat
