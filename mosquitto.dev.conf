# dev-only. mounted via docker-compose.override.yml. staging/prod skip
# this and use mosquitto.conf. adds plaintext 1883 + drops ACL so bench
# tools can publish without device certs. 8883 mTLS unchanged

listener 8883
protocol mqtt

cafile /mosquitto/certs/ca-bundle.crt
certfile /mosquitto/certs/server/server.crt
keyfile /mosquitto/certs/server/server.key

require_certificate true
use_identity_as_username true
allow_anonymous false

tls_version tlsv1.2

# no acl_file in dev. keeps 1883 anon listener open. 8883 still trusted
# via service CA. prod re-enables ACL via mosquitto.conf

log_dest stdout
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S
connection_messages true

# dev plaintext listener
listener 1883
protocol mqtt
allow_anonymous true
